<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex,follow" />
    <link rel="canonical" href="https://bugsensedx.com/en" />
    <link rel="alternate" hreflang="en" href="https://bugsensedx.com/en" />
    <link rel="alternate" hreflang="de" href="https://bugsensedx.com/de" />
    <link rel="alternate" hreflang="x-default" href="https://bugsensedx.com/en" />
    <title>BugSense</title>
    <script>
      (function () {
        var base = location.pathname;
        if (base.charAt(base.length - 1) !== "/") base += "/";
        var l = (navigator.language || "en").toLowerCase();
        var target = l.indexOf("de") === 0 ? "de/" : "en/";
        location.replace(base + target + location.search + location.hash);
      })();
    </script>
  </head>

    <noscript>
      <p>
        Please enable JavaScript, or continue to
        <a href="en/">English</a> / <a href="de/">Deutsch</a>.
